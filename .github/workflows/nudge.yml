# the repo grows a conscience
name: daily nudge

on:
  schedule:
    - cron: "30 15 * * *"   # 9:00 pm IST, prime guilt hours
  workflow_dispatch: {}      # or poke it by hand from the Actions tab

jobs:
  nudge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python nudge.py
        env:
          WA_ADITI_PHONE: ${{ secrets.WA_ADITI_PHONE }}
          WA_ADITI_KEY: ${{ secrets.WA_ADITI_KEY }}
          WA_AYUSH_PHONE: ${{ secrets.WA_AYUSH_PHONE }}
          WA_AYUSH_KEY: ${{ secrets.WA_AYUSH_KEY }}
